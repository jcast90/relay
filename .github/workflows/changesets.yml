name: Changesets

# Changesets-driven release automation. Contributors write a PR that
# includes a `.changeset/<name>.md` file (generated via `pnpm changeset`)
# describing their bump. On merge to `main`, this workflow:
#
#   1. Detects the pending changesets and opens/updates a "Version
#      Packages" PR. That PR's diff is generated by `pnpm changeset-version`,
#      which chains three steps: `changeset version` (bumps `package.json`,
#      updates `CHANGELOG.md`, deletes the consumed `.changeset/*.md`),
#      `node scripts/sync-versions.mjs` (bumps `gui/package.json` and every
#      Cargo.toml in lockstep), and `cargo check --workspace` (regenerates
#      `Cargo.lock` so the Cargo manifest and lock stay consistent —
#      without this, release-gui's frozen-lockfile build fails on the next
#      tag push).
#
#   2. When the "Version Packages" PR is merged, the action sees no
#      pending changesets and runs the `publish` step — which here is
#      `pnpm exec changeset tag`. That creates a `vX.Y.Z` git tag from
#      the now-current `package.json` version and pushes it. The
#      existing `release.yml` picks up the tag push, runs the npm
#      publish via OIDC, builds Tauri bundles on all three platforms,
#      and cuts the GitHub Release.
#
# We deliberately do NOT let changesets publish to npm itself — that
# responsibility stays with release.yml + Trusted Publishers. Changesets
# is only the versioning + tagging surface.

on:
  push:
    branches:
      - main

# Only one version-automation run at a time — protects against racing
# "Version Packages" PR updates when multiple changeset-bearing PRs land
# back-to-back.
concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version-or-tag:
    name: version-or-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # `changesets/action` needs the full history to diff against the
          # base branch and to create a clean tag.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust toolchain
        # `scripts/sync-versions.mjs` calls `cargo check --workspace` to
        # regenerate Cargo.lock after bumping the Cargo.tomls; the action
        # needs a cargo on PATH when it invokes `pnpm changeset-version`
        # inside the Version Packages PR update.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changesets action
        uses: changesets/action@v1
        with:
          # Generates / updates the Version Packages PR.
          version: pnpm changeset-version
          # After the Version Packages PR merges and no more changesets
          # remain, create a git tag from the current package.json version.
          # The tag push triggers release.yml which handles npm publish +
          # Tauri bundles + GitHub Release.
          publish: pnpm exec changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
          # We create GitHub Releases in release.yml (after the tag fires),
          # not here — keeps the release-notes source of truth in CHANGELOG.md
          # via the awk extractor in release.yml.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
