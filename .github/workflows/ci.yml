name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ts-verify:
    name: ts-verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build GUI (Vite bundle)
        run: |
          cd gui
          pnpm install --frozen-lockfile
          pnpm build

      - name: Test GUI (vitest)
        # Regression guard for Tauri-WKWebView-specific UI bugs. If this
        # fails, see gui/src/components/*.test.tsx for the scenarios.
        run: |
          cd gui
          pnpm test

  rust-check:
    name: rust-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libx11-dev

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --workspace --locked

      - name: Cargo test (workspace)
        run: cargo test --workspace

  format-check:
    name: format-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prettier check
        run: pnpm dlx prettier --check 'src/**/*.{ts,tsx}' 'test/**/*.{ts,tsx}' 'gui/src/**/*.{ts,tsx}' 'scripts/**/*.{ts,mts}' '*.md' 'docs/**/*.md'

      - name: No window.prompt/confirm/alert in gui/src
        # Tauri v2 WKWebView no-ops these (see gui/src/lib/dialogs.ts).
        # Every past attempt cost real users a broken flow — keep them out.
        # Uses `|| true` on the grep to let the script handle both matched
        # and unmatched exits.
        run: |
          MATCHES=$(grep -rnE "\bwindow\.(prompt|confirm|alert)\s*\(" gui/src || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::window.prompt/confirm/alert no-op in Tauri v2 WKWebView. Route through PromptModal or gui/src/lib/dialogs.ts."
            echo "$MATCHES"
            exit 1
          fi
